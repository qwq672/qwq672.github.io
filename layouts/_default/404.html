{{ define "main" }}
<div class="container" style="text-align: center; padding: 4rem 1.5rem;">
  <h1 style="font-size: 6rem; margin-bottom: 1rem; color: var(--color-text-primary);">404</h1>
  <p style="font-size: 1.25rem; color: var(--color-text-secondary); margin-bottom: 2rem;">抱歉，您访问的页面不存在。</p>
  <a href="{{ .Site.BaseURL }}" style="display: inline-block; padding: 0.75rem 2rem; background: var(--color-primary); color: white; text-decoration: none; border-radius: 4px; transition: background 0.2s ease;">返回首页</a>
</div>
{{ end }}
