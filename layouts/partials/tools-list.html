<div class="tools-page">
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">工具</h1>
      <p class="page-description">这里收集了我开发的各种实用工具</p>
    </header>

    <div class="tools-grid">
      {{ range .Pages }}
      {{ if eq .Params.type "tool" }}
      <a href="{{ .Params.tool_url }}" class="tool-card" target="_blank" rel="noopener">
        <div class="tool-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
          </svg>
        </div>
        <h2 class="tool-title">{{ .Title }}</h2>
        <p class="tool-desc">{{ .Description }}</p>
        <span class="tool-link">
          使用工具 →
        </span>
      </a>
      {{ end }}
      {{ end }}
    </div>
  </div>
</div>
