<div class="projects-page">
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">项目<span class="page-stats">共 {{ len (where .Site.Pages "Section" "projects") }} 个项目</span></h1>
      <p class="page-description">这里展示了我开发的项目作品</p>
    </header>

    <div class="projects-grid">
      {{ range .Pages }}
      {{ if eq .Params.type "project" }}
      <a href="{{ .Params.project_url }}" class="project-card" target="_blank" rel="noopener">
        <div class="project-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        <h2 class="project-title">{{ .Title }}</h2>
        <p class="project-desc">{{ .Description }}</p>
        <span class="project-link">
          查看项目
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </span>
      </a>
      {{ end }}
      {{ end }}
    </div>
  </div>
</div>
